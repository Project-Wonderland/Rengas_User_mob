<div class="app-shell">
  <main class="app" id="app">
    <div class="app-splash" *ngIf="showSplash">
      <div class="splash-logo-wrap">
        <img [src]="logo" alt="RENGAS Logo" />
      </div>
      <div class="splash-loader"><i></i></div>
    </div>

    <!-- Feature Components -->
    <app-security-lock 
      *ngIf="screen === 'security'"
      [isActive]="screen === 'security'" 
      [logo]="logo" 
      (unlock)="unlockSecurity()">
    </app-security-lock>

    <app-login-portal 
      *ngIf="screen === 'login'"
      [isActive]="screen === 'login'" 
      [logo]="logo" 
      (login)="onLogin($event)">
    </app-login-portal>

    <app-product-catalog 
      *ngIf="screen === 'products'"
      [isActive]="screen === 'products'" 
      [logo]="logo" 
      [cats]="cats" 
      [activeCat]="activeCat" 
      [filteredProducts]="filteredProducts" 
      [cart]="cart" 
      [search]="search" 
      [totals]="totals" 
      [selectedUoms]="selectedUoms"
      (menuOpen)="menuOpen = true" 
      (screenChange)="go($any($event))" 
      (setCat)="setCat($event)" 
      (setSearch)="setSearch($event)" 
      (setUom)="setUom($event)" 
      (incrementQty)="incrementQty($event)" 
      (decrementQty)="decrementQty($event)">
    </app-product-catalog>

    <app-category-explorer 
      *ngIf="screen === 'categories'"
      [isActive]="screen === 'categories'" 
      [logo]="logo" 
      [products]="products" 
      [cats]="cats" 
      [totals]="totals"
      (menuOpen)="menuOpen = true" 
      (screenChange)="go($any($event))" 
      (setCat)="setCat($event)">
    </app-category-explorer>

    <app-shopping-cart 
      *ngIf="screen === 'cart'"
      [isActive]="screen === 'cart'" 
      [logo]="logo" 
      [cartRows]="cartRows" 
      [totals]="totals"
      (screenChange)="go($any($event))" 
      (clearCart)="clearCart()" 
      (changeQty)="changeQty($event)" 
      (removeFromCart)="removeFromCart($event)">
    </app-shopping-cart>

    <app-order-summary-form 
      *ngIf="screen === 'summary'"
      [isActive]="screen === 'summary'" 
      [customer]="customer" 
      [totals]="totals"
      (screenChange)="go($any($event))" 
      (submitOrder)="submitOrder()"
      (customerChange)="customer = $event">
    </app-order-summary-form>

    <app-order-history 
      *ngIf="screen === 'orders'"
      [isActive]="screen === 'orders'" 
      [orders]="orders"
      (screenChange)="go($any($event))" 
      (deleteOrder)="deleteOrder($event)" 
      (selectOrder)="selectedOrder = $event; go('orderDetails')">
    </app-order-history>

    <app-order-details-view 
      *ngIf="screen === 'orderDetails'"
      [isActive]="screen === 'orderDetails'" 
      [order]="selectedOrder" 
      [demoCustomer]="demoCustomer"
      (screenChange)="go($any($event))">
    </app-order-details-view>

    <app-order-success 
      *ngIf="screen === 'success'"
      [isActive]="screen === 'success'" 
      [successSpans]="successSpans"
      (screenChange)="go($any($event))">
    </app-order-success>

    <div class="drawer-backdrop" [class.show]="menuOpen" (click)="menuOpen = false"></div>
    <aside class="side-menu" [class.show]="menuOpen">
      <div class="menu-head">
        <button class="menu-close" type="button" (click)="menuOpen = false">×</button>
        <img [src]="logo" alt="Logo" />
        <h3>RENGAS Customer</h3>
        <p>Wholesale Buyer Account</p>
      </div>
      <button class="menu-link" type="button" (click)="go('products')">⌂ <span>Products</span></button>
      <button class="menu-link" type="button" (click)="go('categories')">▦ <span>Categories</span></button>
      <button class="menu-link" type="button" (click)="go('cart')">🛒 <span>Cart</span></button>
      <button class="menu-link" type="button" (click)="go('orders')">☷ <span>Order History</span></button>
      <label class="menu-link security-toggle">🔒 <span>Password / Fingerprint</span><input type="checkbox" [checked]="securityEnabled" (change)="toggleSecurity($any($event.target).checked)" /></label>
      <button class="menu-link" type="button" (click)="confirmLogout = true">↩ <span>Logout</span></button>
    </aside>

    <button class="sticky-cart global-sticky" type="button" *ngIf="screen === 'products' && totals.items" (click)="go('cart')">
      <div><b>{{ totals.items }} Items Selected</b><small>View Cart</small></div><span>Proceed</span>
    </button>

    <button class="cart-proceed" type="button" *ngIf="screen === 'cart' && totals.items" (click)="go('summary')">
      <span>{{ totals.items }} items</span>
      <b>Proceed Order</b>
      <em>{{ money(totals.total) }}</em>
    </button>

    <nav class="bottom-nav" [class.hidden]="['login', 'security', 'success'].includes(screen)">
      <button type="button" data-nav="products" (click)="go('products')" [class.active]="screen === 'products'"><i>⌂</i><span>Home</span></button>
      <button type="button" data-nav="categories" (click)="go('categories')" [class.active]="screen === 'categories'"><i>▦</i><span>Category</span></button>
      <button type="button" data-nav="cart" (click)="go('cart')" [class.active]="screen === 'cart'"><i>🛒</i><em class="navBadge">{{ totals.items }}</em><span>Cart</span></button>
      <button type="button" data-nav="orders" (click)="go('orders')" [class.active]="screen === 'orders'"><i>☷</i><span>Order</span></button>
    </nav>

    <div class="confirm-backdrop" *ngIf="confirmLogout">
      <div class="confirm-box">
        <h3>Sure want to log out?</h3>
        <p>Your cart will stay saved until app closes.</p>
        <div>
          <button type="button" (click)="confirmLogout = false">No</button>
          <button class="danger" type="button" (click)="logout()">Yes</button>
        </div>
      </div>
    </div>
  </main>
</div>
