<section class="screen login no-nav" [class.active]="isActive">
  <div class="login-card">
    <img [src]="logo" class="login-logo" alt="RENGAS Logo" />
    <h1>RENGAS</h1>
    <p>Customer order portal</p>
    <label>Username</label>
    <input id="loginUser" name="loginUser" [(ngModel)]="loginUser" autoComplete="username" />
    <label>Password</label>
    <input id="loginPass" name="loginPass" type="password" [(ngModel)]="loginPass" autoComplete="current-password" />
    <button class="primary-btn" type="button" (click)="onLogin()">LOGIN</button>
    <small class="hint">Demo: customer01 / 123456</small>
  </div>
</section>
